# semantic-release config (Node). Creates GitHub releases/tags from
# Conventional Commits without rewriting pyproject.toml — version stays
# driven by git tags via uv-dynamic-versioning.
# https://semantic-release.gitbook.io/

branches:
  - main
  - master

plugins:
  - "@semantic-release/commit-analyzer"
  - "@semantic-release/release-notes-generator"
  - "@semantic-release/github"

tagFormat: "v${version}"

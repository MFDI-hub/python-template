# Dependabot keeps GitHub Actions and Python deps up to date.
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Dependabot reads pyproject.toml / uv.lock for Python projects.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

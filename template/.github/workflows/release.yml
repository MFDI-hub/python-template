name: Semantic Release

# Creates a GitHub Release (and tag) from Conventional Commits on main/master.
# That release triggers publish.yml → PyPI. Version numbers come from the tag
# via uv-dynamic-versioning (no pyproject.toml rewrite).
#
# Requires Conventional Commits (enforced locally via Commitizen).
# Manual releases still work via GitHub Releases UI — see docs/publishing.md.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Pre-commit hooks for local quality checks.
# Install once: `uv run pre-commit install`
# Run manually: `uv run pre-commit run --all-files`
# Docs: https://pre-commit.com/

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: ^(uv\.lock|\.git/)

  - repo: local
    hooks:
      - id: ty
        name: ty type check
        entry: uv run ty check src tests devtools
        language: system
        pass_filenames: false
        types: [python]

      - id: vulture
        name: vulture dead code
        entry: uv run vulture
        language: system
        pass_filenames: false
        types: [python]
